server.port: 8080

spring:
  application:
    name: fresnel-backend
  web:
    resources:
      add-mappings: true

  # Default profile uses an in-memory H2 database. This keeps `mvn spring-boot:run`
  # and `mvn test` working without any external service. For production / staging
  # activate the `postgres` profile (see application-postgres.yml) by setting
  # SPRING_PROFILES_ACTIVE=postgres and providing DB_URL/DB_USER/DB_PASSWORD.
  datasource:
    url: jdbc:h2:mem:fresnel;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

# Allow the dev frontend (Vite default port) to talk to the backend.
fresnel:
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
  security:
    # Default credentials for local development. Override with
    # FRESNEL_SECURITY_USER_PASSWORD / FRESNEL_SECURITY_ADMIN_PASSWORD env vars
    # (or any other Spring config source) in any non-throwaway environment.
    user:
      username: user
      password: user
    admin:
      username: admin
      password: admin
