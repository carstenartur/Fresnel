# Standalone / local-desktop profile.
#
# Used by the Windows / Linux installers and the start-fresnel scripts
# in packaging/. The app behaves like a single-user local web server:
#
#   * binds to http://localhost:${SERVER_PORT:8080}
#   * uses a file-based H2 database stored under FRESNEL_DATA_DIR
#   * does NOT require Docker, PostgreSQL, or any external service
#
# FRESNEL_DATA_DIR is provided by the launch scripts:
#   Windows : %APPDATA%\Fresnel        (typically C:\Users\<u>\AppData\Roaming\Fresnel)
#   Linux   : $HOME/.local/share/fresnel
#   macOS   : $HOME/Library/Application Support/Fresnel
#
# When the app is launched directly by the jpackage installer (i.e. via
# JarLauncher, without the start-fresnel scripts) FRESNEL_DATA_DIR is
# unset, so we fall back through a chain of placeholders that resolves
# to the same per-user OS location:
#   * Windows : ${APPDATA}/Fresnel        (APPDATA env var → Roaming dir)
#   * Linux   : ${XDG_DATA_HOME}/Fresnel  (or ${user.home}/.local/share/Fresnel)
#   * macOS   : ${user.home}/.local/share/Fresnel (close enough; users who
#                care can set FRESNEL_DATA_DIR explicitly)
server:
  port: ${SERVER_PORT:8080}
  address: ${SERVER_ADDRESS:127.0.0.1}

spring:
  datasource:
    url: jdbc:h2:file:${FRESNEL_DATA_DIR:${APPDATA:${XDG_DATA_HOME:${user.home}/.local/share}}/Fresnel}/db/fresnel;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;AUTO_SERVER=TRUE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

fresnel:
  # No CORS exposure needed: the SPA is served from the same origin.
  cors:
    allowed-origins: ""
  security:
    # Default credentials. Override via FRESNEL_SECURITY_* environment
    # variables (see README.md → Authentication) before exposing the
    # app to anything but localhost.
    user:
      username: ${FRESNEL_SECURITY_USER_USERNAME:user}
      password: ${FRESNEL_SECURITY_USER_PASSWORD:user}
    admin:
      username: ${FRESNEL_SECURITY_ADMIN_USERNAME:admin}
      password: ${FRESNEL_SECURITY_ADMIN_PASSWORD:admin}
