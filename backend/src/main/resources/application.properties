server.port=8080
spring.application.name=fresnel-backend

# Static frontend (built by `npm run build` to ../frontend/dist) is served from the classpath
# when packaged via the `with-frontend` profile.
spring.web.resources.add-mappings=true

# Allow the dev frontend (Vite default port) to talk to the backend.
fresnel.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
