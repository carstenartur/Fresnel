# Production profile: PostgreSQL via env vars.
#
# Activate with SPRING_PROFILES_ACTIVE=postgres and set:
#   DB_URL      - e.g. jdbc:postgresql://localhost:5432/fresnel
#   DB_USER     - e.g. fresnel
#   DB_PASSWORD - e.g. fresnel
#
# Example local Postgres bring-up:
#   docker run --rm --name fresnel-pg -e POSTGRES_DB=fresnel \
#       -e POSTGRES_USER=fresnel -e POSTGRES_PASSWORD=fresnel \
#       -p 5432:5432 postgres:16
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fresnel}
    username: ${DB_USER:fresnel}
    password: ${DB_PASSWORD:fresnel}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
