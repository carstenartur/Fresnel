name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0) — for manual runs only'
        required: true

permissions:
  contents: write   # create GitHub Release + upload assets
  packages: write   # push to GHCR

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1 – Build (Maven + bundled frontend)
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.value }}
      jar_name: ${{ steps.jar.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Maven build & verify (with bundled frontend)
        run: mvn -B -ntp verify

      - name: Locate Boot Jar
        id: jar
        run: |
          JAR=$(ls backend/target/backend-*.jar | grep -v 'original' | head -1)
          echo "path=$JAR" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $JAR)" >> "$GITHUB_OUTPUT"

      - name: Upload Boot Jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: boot-jar
          path: ${{ steps.jar.outputs.path }}
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2 – Create GitHub Release with assets
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Boot Jar artifact
        uses: actions/download-artifact@v4
        with:
          name: boot-jar
          path: dist/

      - name: Rename Jar to include version
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          SRC=$(ls dist/backend-*.jar | grep -v original | head -1)
          DEST="dist/backend-${VERSION}.jar"
          mv "$SRC" "$DEST"
          echo "jar_path=$DEST" >> "$GITHUB_ENV"

      - name: Generate SHA-256 checksum
        run: |
          cd dist
          sha256sum backend-${{ needs.build.outputs.version }}.jar \
            > backend-${{ needs.build.outputs.version }}.jar.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: Fresnel ${{ needs.build.outputs.version }}
          generate_release_notes: true
          files: |
            dist/backend-${{ needs.build.outputs.version }}.jar
            dist/backend-${{ needs.build.outputs.version }}.jar.sha256

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3 – Build & push Docker image to GHCR
  # ────────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker Image
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/carstenartur/fresnel
          tags: |
            type=semver,pattern={{version}},value=${{ needs.build.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.build.outputs.version }}
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
