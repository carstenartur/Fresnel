name: Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., 0.1.2)'
        required: true
        type: string
        default: '0.1.2'
      skip_tests:
        description: 'Skip tests during release build'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Dry run - validate everything but do not publish'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  preflight:
    name: Preflight Checks
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.versions.outputs.release_version }}
      next_snapshot: ${{ steps.versions.outputs.next_snapshot }}
      maintenance_branch: ${{ steps.versions.outputs.maintenance_branch }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Validate release version input
        run: |
          VERSION="${{ inputs.release_version }}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid release_version '$VERSION' (expected X.Y.Z without prefix)"
            exit 1
          fi

      - name: Calculate version outputs
        id: versions
        run: |
          RELEASE="${{ inputs.release_version }}"
          IFS='.' read -r major minor patch <<< "$RELEASE"
          NEXT_PATCH=$((patch + 1))
          NEXT_SNAPSHOT="${major}.${minor}.${NEXT_PATCH}-SNAPSHOT"
          MAINT_BRANCH="maintenance/${major}.${minor}.x"

          echo "release_version=${RELEASE}" >> "$GITHUB_OUTPUT"
          echo "next_snapshot=${NEXT_SNAPSHOT}" >> "$GITHUB_OUTPUT"
          echo "maintenance_branch=${MAINT_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Check if release tag already exists
        run: |
          VERSION="${{ inputs.release_version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/${VERSION}$"; then
            echo "::error::Tag ${VERSION} already exists"
            exit 1
          fi

      - name: Validate current pom version is SNAPSHOT
        run: |
          CURRENT=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          if [[ "$CURRENT" != *-SNAPSHOT ]]; then
            echo "::error::Current project version '$CURRENT' is not a SNAPSHOT"
            exit 1
          fi
          echo "Current project version: $CURRENT"

      - name: Preflight summary
        run: |
          echo "## Preflight Check Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release version | ${{ steps.versions.outputs.release_version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Next SNAPSHOT | ${{ steps.versions.outputs.next_snapshot }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Maintenance branch | ${{ steps.versions.outputs.maintenance_branch }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dry run | ${{ inputs.dry_run }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Skip tests | ${{ inputs.skip_tests }} |" >> "$GITHUB_STEP_SUMMARY"

  release:
    name: Build and Release
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure on main branch
        run: git checkout main

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure git author
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Set release version in all poms
        run: |
          mvn versions:set -DnewVersion=${{ needs.preflight.outputs.release_version }} -DgenerateBackupPoms=false

      - name: Commit release version changes
        run: |
          git add pom.xml backend/pom.xml optics-core/pom.xml
          git commit -m "Release version ${{ needs.preflight.outputs.release_version }}"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build and verify
        run: |
          if [[ "${{ inputs.skip_tests }}" == "true" ]]; then
            mvn -B -ntp verify -DskipTests
          else
            mvn -B -ntp verify
          fi

      - name: Prepare release assets
        run: |
          VERSION="${{ needs.preflight.outputs.release_version }}"
          mkdir -p dist
          JAR="backend/target/backend-${VERSION}.jar"
          if [ ! -f "$JAR" ]; then
            echo "::error::Expected boot jar not found at $JAR"
            ls -la backend/target || true
            exit 1
          fi
          cp "$JAR" "dist/backend-${VERSION}.jar"
          (cd dist && sha256sum "backend-${VERSION}.jar" > "backend-${VERSION}.jar.sha256")

      - name: Capture release commit SHA
        id: release_commit
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Push release commit to main (temp branch + API fast-forward)
        if: ${{ !inputs.dry_run }}
        run: |
          set -e
          COMMIT_SHA="${{ steps.release_commit.outputs.sha }}"
          TEMP_BRANCH="release-temp-${{ needs.preflight.outputs.release_version }}"

          if git ls-remote --exit-code --heads origin "$TEMP_BRANCH" >/dev/null 2>&1; then
            git push origin ":refs/heads/${TEMP_BRANCH}"
          fi
          git push origin "HEAD:refs/heads/${TEMP_BRANCH}"

          gh api "repos/${{ github.repository }}/git/refs/heads/main" \
            --method PATCH \
            -f sha="$COMMIT_SHA" || {
              echo "::error::Failed to fast-forward main to ${COMMIT_SHA}"
              exit 1
            }

      - name: Dry run - Skip pushing release commit
        if: ${{ inputs.dry_run }}
        run: |
          echo "::notice::Dry run mode - would push release commit ${{ steps.release_commit.outputs.sha }} to main via temp branch + API fast-forward"

      - name: Cleanup temporary release branch
        if: ${{ success() && !inputs.dry_run }}
        run: |
          TEMP_BRANCH="release-temp-${{ needs.preflight.outputs.release_version }}"
          if git ls-remote --exit-code --heads origin "$TEMP_BRANCH" >/dev/null 2>&1; then
            git push origin ":refs/heads/${TEMP_BRANCH}"
          fi

      - name: Create and push annotated tag
        if: ${{ !inputs.dry_run }}
        run: |
          set -e
          VERSION="${{ needs.preflight.outputs.release_version }}"
          COMMIT_SHA="${{ steps.release_commit.outputs.sha }}"

          TAG_SHA=$(gh api "repos/${{ github.repository }}/git/tags" \
            --method POST \
            -f tag="$VERSION" \
            -f message="Release version $VERSION" \
            -f object="$COMMIT_SHA" \
            -f type="commit" \
            --jq '.sha')

          gh api "repos/${{ github.repository }}/git/refs" \
            --method POST \
            -f ref="refs/tags/${VERSION}" \
            -f sha="$TAG_SHA"

      - name: Dry run - Skip tag creation
        if: ${{ inputs.dry_run }}
        run: |
          echo "::notice::Dry run mode - would create annotated tag ${{ needs.preflight.outputs.release_version }}"

      - name: Create maintenance branch
        if: ${{ !inputs.dry_run }}
        run: |
          set -e
          BRANCH_NAME="${{ needs.preflight.outputs.maintenance_branch }}"
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null 2>&1; then
            echo "Branch $BRANCH_NAME already exists, skipping"
          else
            gh api "repos/${{ github.repository }}/git/refs" \
              --method POST \
              -f ref="refs/heads/${BRANCH_NAME}" \
              -f sha="${{ steps.release_commit.outputs.sha }}"
          fi

      - name: Dry run - Skip maintenance branch creation
        if: ${{ inputs.dry_run }}
        run: |
          echo "::notice::Dry run mode - would create branch ${{ needs.preflight.outputs.maintenance_branch }}"

      - name: Create GitHub Release and upload jar assets
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION="${{ needs.preflight.outputs.release_version }}"
          gh release create "$VERSION" \
            "dist/backend-${VERSION}.jar" \
            "dist/backend-${VERSION}.jar.sha256" \
            --title "Fresnel ${VERSION}" \
            --generate-notes

      - name: Dry run - Skip GitHub Release creation
        if: ${{ inputs.dry_run }}
        run: |
          VERSION="${{ needs.preflight.outputs.release_version }}"
          echo "::notice::Dry run mode - would create GitHub release $VERSION (title: Fresnel $VERSION)"
          echo "::notice::Dry run mode - would upload dist/backend-${VERSION}.jar"
          echo "::notice::Dry run mode - would upload dist/backend-${VERSION}.jar.sha256"

      - name: Set up QEMU (multi-arch)
        if: ${{ !inputs.dry_run }}
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: ${{ !inputs.dry_run }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ !inputs.dry_run }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        if: ${{ !inputs.dry_run }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/carstenartur/fresnel
          tags: |
            type=raw,value=${{ needs.preflight.outputs.release_version }}
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        if: ${{ !inputs.dry_run }}
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Dry run - Skip Docker push
        if: ${{ inputs.dry_run }}
        run: |
          VERSION="${{ needs.preflight.outputs.release_version }}"
          echo "::notice::Dry run mode - would push ghcr.io/carstenartur/fresnel:${VERSION}"
          echo "::notice::Dry run mode - would push ghcr.io/carstenartur/fresnel:latest"
          echo "::notice::Dry run mode - would push ghcr.io/carstenartur/fresnel:sha-<short-sha>"

      - name: Clean working directory
        run: |
          git checkout main
          git reset --hard "${{ steps.release_commit.outputs.sha }}"
          git clean -fd

      - name: Bump to next SNAPSHOT version
        run: |
          mvn versions:set -DnewVersion=${{ needs.preflight.outputs.next_snapshot }} -DgenerateBackupPoms=false

      - name: Create PR for next development iteration
        run: |
          NEXT_VERSION="${{ needs.preflight.outputs.next_snapshot }}"
          BRANCH_NAME="release/prepare-next-${NEXT_VERSION}"

          git checkout -B "$BRANCH_NAME"
          git add pom.xml backend/pom.xml optics-core/pom.xml
          git commit -m "Prepare for next development iteration ${NEXT_VERSION}"

          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            echo "::notice::Dry run mode - would push branch ${BRANCH_NAME}"
            echo "::notice::Dry run mode - would create PR 'Prepare for next development iteration ${NEXT_VERSION}' into main"
            exit 0
          fi

          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null 2>&1; then
            git push origin ":refs/heads/${BRANCH_NAME}"
          fi
          git push origin "$BRANCH_NAME"

          gh pr create \
            --title "Prepare for next development iteration ${NEXT_VERSION}" \
            --body "Automated PR to bump pom versions to ${NEXT_VERSION} after release ${{ needs.preflight.outputs.release_version }}." \
            --base main \
            --head "$BRANCH_NAME"
