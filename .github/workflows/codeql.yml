name: CodeQL

# CodeQL static analysis for Java (backend + optics-core) and JavaScript/TypeScript
# (frontend). Runs on every push / PR to main and weekly on a schedule so we
# pick up new advisories even when the repo is quiet.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - '**.java'
      - '**.ts'
      - '**.tsx'
      - '**.js'
      - '**.jsx'
      - '**/pom.xml'
      - 'frontend/package*.json'
      - '.github/workflows/codeql.yml'
  schedule:
    - cron: '37 10 * * 6'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java
            build-mode: manual
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        if: matrix.language == 'java'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Build Java sources
        if: matrix.language == 'java'
        run: mvn -B -ntp -DskipTests package

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
