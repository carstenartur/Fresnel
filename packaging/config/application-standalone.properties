# Fresnel — standalone (local) configuration template.
#
# This file is loaded by the start-fresnel scripts via
#   --spring.config.additional-location=optional:file:<install>/config/
# so any property you set here overrides the bundled
# application-standalone.yml defaults.
#
# Settings shown below are commented out; uncomment to change.

# --- HTTP -------------------------------------------------------------
# Port the local web server listens on (default 8080).
#server.port=8080
# Bind address. 127.0.0.1 (the default) means localhost-only.
# Set to 0.0.0.0 to expose Fresnel on your LAN (NOT recommended unless
# you also change the credentials below).
#server.address=127.0.0.1

# --- Data directory ---------------------------------------------------
# The launch scripts already set FRESNEL_DATA_DIR to the per-user
# application data folder:
#   Windows : %APPDATA%\Fresnel
#   Linux   : $HOME/.local/share/fresnel
#   macOS   : $HOME/Library/Application Support/Fresnel
#
# The H2 database lives at <FRESNEL_DATA_DIR>/db/fresnel.mv.db.
# Override either by editing the launch script or by setting
# FRESNEL_DATA_DIR in your shell before starting Fresnel.

# --- Credentials ------------------------------------------------------
# Change these for any non-throwaway install.
#fresnel.security.user.username=user
#fresnel.security.user.password=user
#fresnel.security.admin.username=admin
#fresnel.security.admin.password=admin
